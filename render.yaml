services:
  - type: web
    name: customer-lead-crm-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:mysql://<your-cloud-db-host>:<port>/<database-name>?useSSL=true&serverTimezone=UTC"
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-netlify-app.netlify.app,http://localhost:4200,http://localhost:8081"
